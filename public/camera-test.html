<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Cámara - Escáner Verito</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; padding: 20px; max-width: 500px; margin: 0 auto; }
  .card { background: white; border-radius: 12px; padding: 20px; margin: 10px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  button { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; background: #0F6E56; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 10px 0; }
  button:hover { background: #0c5c47; }
  #video { width: 100%; background: black; border-radius: 8px; }
  .status { padding: 10px; margin: 10px 0; border-radius: 8px; text-align: center; font-weight: bold; }
  .success { background: #d4edda; color: #155724; }
  .error { background: #f8d7da; color: #721c24; }
  .info { background: #d1ecf1; color: #0c5985; }
  code { background: #f4f4f4; padding: 5px 10px; border-radius: 4px; display: block; margin: 10px 0; }
</style>
</head>
<body>

<div class="card">
  <h1>📹 Test de Cámara</h1>
  <button onclick="testCamera()">Activar Cámara</button>
  <button onclick="stopCamera()">Detener Cámara</button>
  <button onclick="testQuagga()">Test Quagga Scanner</button>
  <div id="status"></div>
</div>

<div class="card">
  <video id="video" width="100%"></video>
</div>

<div class="card" id="logs"></div>

<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>

<script>
let stream = null;

function log(msg, type = 'info') {
  const logsDiv = document.getElementById('logs');
  const div = document.createElement('div');
  div.className = `status ${type}`;
  div.textContent = msg;
  logsDiv.insertBefore(div, logsDiv.firstChild);
  console.log(`[${type.toUpperCase()}] ${msg}`);
}

async function testCamera() {
  const status = document.getElementById('status');
  const video = document.getElementById('video');
  
  try {
    log('📡 Solicitando acceso a cámara...', 'info');
    status.innerHTML = '<div class="status info">Solicitando permisos...</div>';
    
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    
    log('✓ Permisos concedidos', 'success');
    video.srcObject = stream;
    
    video.onloadedmetadata = () => {
      video.play();
      log('✓ Cámara activada correctamente', 'success');
      status.innerHTML = '<div class="status success">✓ Cámara funcionando</div>';
    };
    
  } catch (error) {
    log(`❌ Error: ${error.name} - ${error.message}`, 'error');
    status.innerHTML = `<div class="status error">❌ ${error.message}</div>`;
    
    if (error.name === 'NotAllowedError') {
      log('Necesitas permitir acceso a la cámara en los permisos del navegador', 'error');
    } else if (error.name === 'NotFoundError') {
      log('No se encontró cámara en el dispositivo', 'error');
    }
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    document.getElementById('video').srcObject = null;
    log('⏹ Cámara detenida', 'info');
    document.getElementById('status').innerHTML = '<div class="status info">Cámara detenida</div>';
  }
}

async function testQuagga() {
  const status = document.getElementById('status');
  
  if (!stream) {
    log('❌ Primero activa la cámara', 'error');
    return;
  }
  
  try {
    log('🔍 Inicializando Quagga...', 'info');
    status.innerHTML = '<div class="status info">Inicializando escáner...</div>';
    
    Quagga.init({
      inputStream: {
        sourceType: 'LiveStream',
        target: document.querySelector('#video'),
        constraints: {
          facingMode: 'environment',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      },
      decoder: {
        readers: ['code_128_reader', 'ean_reader', 'ean_8_reader', 'upc_reader'],
        debug: { showPatches: false }
      }
    }, (err) => {
      if (err) {
        log(`❌ Error Quagga: ${err.message}`, 'error');
        status.innerHTML = `<div class="status error">❌ ${err.message}</div>`;
        return;
      }
      
      log('✓ Quagga iniciado', 'success');
      status.innerHTML = '<div class="status success">✓ Escáner activo - Escanea un código</div>';
      
      Quagga.start();
      
      Quagga.onDetected((result) => {
        const code = result.codeResult.code;
        log(`✓✓✓ ¡CÓDIGO DETECTADO! ${code}`, 'success');
        status.innerHTML = `<div class="status success">✓ Código: ${code}</div>`;
      });
    });
    
  } catch (error) {
    log(`❌ Error: ${error.message}`, 'error');
  }
}

log('✓ Página cargada', 'success');
log('Paso 1: Click en "Activar Cámara"', 'info');
log('Paso 2: Permite el acceso a la cámara', 'info');
log('Paso 3: Click en "Test Quagga Scanner"', 'info');
</script>

</body></html>
