<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escáner de Productos - Supermercados Verito Cedeño</title>
<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #0F6E56; --green-light: #E1F5EE; --green-mid: #1D9E75;
    --amber: #BA7517; --amber-light: #FAEEDA;
    --red: #A32D2D; --red-light: #FCEBEB;
    --text: #1a1a1a; --muted: #555; --border: #ddd; --bg: #f7f8f6;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--green); color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
  header svg { flex-shrink: 0; }
  header h1 { font-size: 16px; font-weight: 600; line-height: 1.3; }
  header p { font-size: 12px; opacity: .8; }
  main { max-width: 540px; margin: 0 auto; padding: 16px; }
  
  .card { background: #fff; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px; }
  
  #video-wrap { position: relative; background: #111; aspect-ratio: 4/3; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #scan-line { position: absolute; left: 10%; right: 10%; height: 2.5px; background: var(--green-mid); top: 50%; transform: translateY(-50%); animation: sweep 2s ease-in-out infinite; box-shadow: 0 0 10px var(--green-mid); display: none; }
  @keyframes sweep { 0%,100%{top:20%} 50%{top:80%} }
  .corner { position: absolute; width: 28px; height: 28px; border-color: var(--green-mid); border-style: solid; }
  .tl{ top:12px;left:12px;border-width:3px 0 0 3px;border-radius:5px 0 0 0; }
  .tr{ top:12px;right:12px;border-width:3px 3px 0 0;border-radius:0 5px 0 0; }
  .bl{ bottom:12px;left:12px;border-width:0 0 3px 3px;border-radius:0 0 0 5px; }
  .br{ bottom:12px;right:12px;border-width:0 3px 3px 0;border-radius:0 0 5px 0; }
  #overlay { position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:20px; }
  #overlay svg { margin-bottom:10px;opacity:.8; }
  #overlay p { font-size:14px;opacity:.9; }
  
  .controls { padding: 14px; display: flex; gap: 10px; }
  #btn-start { flex:1;padding:12px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s; }
  #btn-start:hover { background:#0c5c47; }
  #btn-start.active { background:#8B0000; }
  
  #status { text-align:center;font-size:13px;color:var(--muted);padding:0 14px 12px;min-height:20px; }
  
  #result-card { display:none; padding: 18px; }
  #result-card .barcode-id { font-size:11px;font-family:monospace;color:var(--muted);margin-bottom:6px; }
  #result-card .prod-name { font-size:19px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.3; }
  #result-card .stock-row { display:flex;align-items:center;gap:6px;margin-bottom:14px; }
  .badge { font-size:12px;padding:4px 10px;border-radius:99px;font-weight:500; }
  .badge-green { background:var(--green-light);color:var(--green); }
  .badge-amber { background:var(--amber-light);color:var(--amber); }
  .badge-red { background:var(--red-light);color:var(--red); }
  #btn-rescan { width:100%;padding:11px;background:var(--green-light);color:var(--green);border:1.5px solid var(--green-mid);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer; }
  
  .manual-row { padding:0 14px 14px;display:flex;gap:8px; }
  .manual-row input { flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-size:14px;background:#fff; }
  .manual-row button { padding:10px 16px;background:var(--green);color:#fff;border:none;border-radius:9px;font-size:14px;cursor:pointer;font-weight:600; }
  
  .section-title { font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:14px 14px 8px;border-top:1px solid var(--border); }
  #search-box { margin:0 14px 14px;position:relative; }
  #search-box input { width:100%;padding:10px 12px 10px 36px;border:1px solid var(--border);border-radius:9px;font-size:14px;background:#fff; }
  #search-box svg { position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted); }
  #search-results { max-height:220px;overflow-y:auto;border-top:1px solid var(--border); }
  .search-item { padding:10px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s; }
  .search-item:hover { background:var(--green-light); }
  .search-item .si-name { font-size:14px;font-weight:500; }
  .search-item .si-code { font-size:11px;color:var(--muted);font-family:monospace; }
  
  .not-found { text-align:center;padding:20px;color:var(--muted); }
  .not-found strong { display:block;font-size:16px;color:var(--red);margin-bottom:4px; }
  
  #total-count { text-align:center;font-size:12px;color:var(--muted);padding-bottom:16px; }
</style>
</head>

    <div class="controls">

    <div id="status">Listo para escanear.</div>
    
    <div id="result-card"></div>
    
    <div class="manual-row">
      <input id="manual-in" type="text" placeholder="Ingresar código manualmente…" inputmode="numeric"/>
      <button id="btn-manual">Buscar</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Buscar por nombre o código</div>
    <div id="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-in" placeholder="Ej: coca cola, galleta, leche…"/>
    </div>
    <div id="search-results"></div>
  </div>
  
  <div id="total-count">6,811 productos cargados desde Supermercados Verito Cedeño</div>
</main>

let scanning = false, lastCode = null;
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const scanLine = document.getElementById('scan-line');
const status = document.getElementById('status');
const resultCard = document.getElementById('result-card');
const btnStart = document.getElementById('btn-start');

function stockBadge(stock) {
  if (stock > 10) return `<span class="badge badge-green">✓ En stock (${stock} unid.)</span>`;
  if (stock > 0)  return `<span class="badge badge-amber">⚠ Stock bajo (${stock} unid.)</span>`;
  return `<span class="badge badge-red">✗ Sin stock</span>`;
}

function showProduct(code) {
  const p = DB[code];
  if (p) {
    resultCard.innerHTML = `
      <div class="barcode-id">📦 Código: ${code}</div>
      <div class="prod-name">${p.name}</div>
      <div class="stock-row">${stockBadge(p.stock)}</div>
      <button id="btn-rescan" onclick="rescan()">🔄 Escanear otro producto</button>`;
  } else {
    resultCard.innerHTML = `
      <div class="not-found">
        <strong>Producto no encontrado</strong>
        Código: ${code}<br>
        <small>Este artículo no está en la base de datos.</small>
      </div>
      <button id="btn-rescan" style="margin-top:12px" onclick="rescan()">🔄 Escanear otro</button>`;
  }
  resultCard.style.display = 'block';
  resultCard.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function rescan() {
  resultCard.style.display = 'none';
  lastCode = null;
  startScanner();
}

function stopScanner() {
  try { Quagga.stop(); } catch(e) {}
  if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
  scanning = false;
  overlay.style.display = 'flex';
  scanLine.style.display = 'none';
  btnStart.classList.remove('active');
  btnStart.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg> Iniciar escáner';
  status.textContent = 'Escáner detenido.';
}

function startScanner() {
  if (scanning) { stopScanner(); return; }
  status.textContent = 'Solicitando acceso a la cámara…';
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } })
    .then(stream => {
      video.srcObject = stream;
      overlay.style.display = 'none';
      scanLine.style.display = 'block';
      scanning = true;
      lastCode = null;
      btnStart.classList.add('active');
      btnStart.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Detener';
      status.textContent = 'Apunta la cámara al código de barras del producto…';
      
      Quagga.init({
        inputStream: { name:"Live", type:"LiveStream", target: video,
          constraints: { facingMode:"environment" } },
        decoder: { readers: ["ean_reader","ean_8_reader","upc_reader","upc_e_reader","code_128_reader","code_39_reader"] },
        locate: true, frequency: 10,
      }, err => {
        if (err) { status.textContent = 'Error: ' + err; return; }
        Quagga.start();
      });

      Quagga.onDetected(result => {
        const code = result.codeResult.code;
        if (code && code !== lastCode) {
          lastCode = code;
          status.textContent = '✓ Código detectado: ' + code;
          showProduct(code);
          stopScanner();
        }
      });
    })
    .catch(() => { status.textContent = 'Cámara no disponible. Usa la búsqueda manual.'; });
}

btnStart.addEventListener('click', startScanner);

document.getElementById('btn-manual').addEventListener('click', () => {
  const c = document.getElementById('manual-in').value.trim();
  if (c) showProduct(c);
});
document.getElementById('manual-in').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btn-manual').click(); });

const searchIn = document.getElementById('search-in');
const searchRes = document.getElementById('search-results');
const allEntries = Object.entries(DB);

searchIn.addEventListener('input', () => {
  const q = searchIn.value.trim().toLowerCase();
  if (q.length < 2) { searchRes.innerHTML = ''; return; }
  const matches = allEntries.filter(([code, p]) =>
    p.name.toLowerCase().includes(q) || code.toLowerCase().includes(q)
  ).slice(0, 30);
  if (!matches.length) { searchRes.innerHTML = '<div class="search-item"><span class="si-name" style="color:#999">Sin resultados</span></div>'; return; }
  searchRes.innerHTML = matches.map(([code, p]) =>
    `<div class="search-item" onclick="showProduct('${code}'); searchIn.value=''; searchRes.innerHTML='';">
      <div class="si-name">${p.name}</div>
      <div class="si-code">${code} &bull; Stock: ${p.stock}</div>
    </div>`
  ).join('');
});
</script>
